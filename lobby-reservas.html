<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservas Airbnb · Lobby</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a2e; min-height: 100vh; }
.header { background: #FF5A5F; color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
.header-title { font-size: 16px; font-weight: 600; }
.header-sub { font-size: 11px; opacity: .8; margin-top: 2px; }
.sync-btn { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4); color: white; padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; }
.tabs { display: flex; background: white; border-bottom: 1px solid #eee; }
.tab { flex: 1; padding: 13px 8px; text-align: center; font-size: 13px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; }
.tab.active { color: #FF5A5F; border-bottom-color: #FF5A5F; }
.content { padding: 14px 16px; max-width: 1000px; margin: 0 auto; }
.stats { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; margin-bottom: 14px; }
@media(min-width:480px){ .stats { grid-template-columns: repeat(4,1fr); } }
.stat { background: white; border-radius: 12px; padding: 12px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.stat-val { font-size: 26px; font-weight: 600; line-height: 1; }
.stat-label { font-size: 11px; color: #888; margin-top: 3px; }
.view-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
.view-tab { padding: 6px 16px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid #ddd; color: #888; background: white; }
.view-tab.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }
.cal-wrap { background: white; border-radius: 14px; box-shadow: 0 1px 6px rgba(0,0,0,.07); overflow: hidden; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid #f0f0f0; }
.cal-nav-btn { background: #f5f5f5; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #555; }
.cal-month { font-size: 16px; font-weight: 600; }
.cal-head { display: grid; grid-template-columns: repeat(7,1fr); background: #fafafa; border-bottom: 1px solid #f0f0f0; }
.cal-dn { text-align: center; font-size: 11px; color: #aaa; padding: 8px 4px; font-weight: 600; }
.cal-body { display: grid; grid-template-columns: repeat(7,1fr); }
.cal-cell { min-height: 100px; border-top: 1px solid #f0f0f0; border-right: 1px solid #f0f0f0; padding: 4px 3px 4px; position: relative; }
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell.empty { background: #fafafa; }
.cal-cell.today-cell { background: #fff8f8; }
.day-num { font-size: 12px; color: #bbb; display: block; margin-bottom: 2px; }
.today-num { background: #FF5A5F; color: white; border-radius: 50%; width: 20px; height: 20px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.bars-area { margin-top: 2px; }
.res-bar { height: 20px; border-radius: 10px; display: flex; align-items: center; padding: 0 7px; font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; position: relative; }
.res-bar.start { border-top-left-radius: 10px; border-bottom-left-radius: 10px; }
.res-bar.end { border-top-right-radius: 10px; border-bottom-right-radius: 10px; }
.res-bar.mid { border-radius: 0; }
.res-bar.c0 { background: #1D9E75; color: white; }
.res-bar.c1 { background: #185FA5; color: white; }
.res-bar.c2 { background: #7F77DD; color: white; }
.res-bar.c3 { background: #D85A30; color: white; }
.res-bar.c4 { background: #854F0B; color: white; }
.res-bar.c5 { background: #3B6D11; color: white; }
.res-bar.c6 { background: #993556; color: white; }
.res-bar.c7 { background: #185F7A; color: white; }
.res-bar.cx { background: #ddd; color: #999; text-decoration: line-through; }
.res-bar .bar-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 10px 16px; border-top: 1px solid #f0f0f0; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
.leg-dot { width: 12px; height: 12px; border-radius: 6px; }
.section-title { font-size: 11px; font-weight: 600; color: #999; letter-spacing: .08em; margin: 16px 0 10px; }
.today-cards { display: grid; gap: 10px; margin-bottom: 16px; }
@media(min-width:480px){ .today-cards { grid-template-columns: repeat(2,1fr); } }
.today-card { background: white; border-radius: 12px; padding: 13px 15px; box-shadow: 0 1px 4px rgba(0,0,0,.06); border-left: 4px solid #1D9E75; }
.today-card.out { border-left-color: #EF9F27; }
.card-type { font-size: 10px; font-weight: 700; letter-spacing: .07em; color: #1D9E75; margin-bottom: 4px; }
.today-card.out .card-type { color: #EF9F27; }
.card-name { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
.card-meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: #777; }
.res-list { display: grid; gap: 8px; }
.res-item { background: white; border-radius: 10px; padding: 12px 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05); display: flex; align-items: center; gap: 12px; }
.res-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.res-info { flex: 1; min-width: 0; }
.res-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.res-dates { font-size: 12px; color: #888; margin-top: 2px; }
.res-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 10px; flex-shrink: 0; }
.b-confirmada { background: #E8F8F5; color: #0F6E56; }
.b-cancelada  { background: #FCEBEB; color: #A32D2D; }
.b-modificada { background: #FAEEDA; color: #854F0B; }
.sync-info { text-align: center; font-size: 11px; color: #bbb; padding: 14px; }
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="header-title">Reservas Airbnb</div>
    <div class="header-sub" id="sync-info">Cargando...</div>
  </div>
  <button class="sync-btn" onclick="reloadAll()">&#8635; Actualizar</button>
</div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('A',this)">Avitat Link 9-6</div>
  <div class="tab" onclick="switchTab('B',this)">Avitat Joy 7-3</div>
</div>
<div class="content">
  <div class="stats" id="stats"></div>
  <div class="view-tabs">
    <div class="view-tab active" onclick="switchView('calendario',this)">Calendario</div>
    <div class="view-tab" onclick="switchView('lista',this)">Lista completa</div>
  </div>
  <div id="view-calendario">
    <div id="today-section"></div>
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>
        <span class="cal-month" id="cal-month"></span>
        <button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button>
      </div>
      <div class="cal-head">
        <div class="cal-dn">L</div><div class="cal-dn">M</div><div class="cal-dn">X</div>
        <div class="cal-dn">J</div><div class="cal-dn">V</div><div class="cal-dn">S</div><div class="cal-dn">D</div>
      </div>
      <div class="cal-body" id="cal-body"></div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>Confirmada</div>
        <div class="leg"><div class="leg-dot" style="background:#ddd;border:1px solid #ccc"></div>Cancelada</div>
      </div>
    </div>
  </div>
  <div id="view-lista" style="display:none">
    <div class="section-title">TODAS LAS RESERVAS</div>
    <div class="res-list" id="res-list"></div>
  </div>
  <div class="sync-info" id="sync-bottom"></div>
</div>
<script>
var URLS={
  A:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTXVQJzIRvR0wzuxx7A_XnTEUvgdtNo5EZsJoFf_bhC6U7ehrkYw2byWa5c1LOLbzXSrVmW3RY8CDRG/pub?gid=579686547&single=true&output=csv',
  B:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTXVQJzIRvR0wzuxx7A_XnTEUvgdtNo5EZsJoFf_bhC6U7ehrkYw2byWa5c1LOLbzXSrVmW3RY8CDRG/pub?gid=1903262233&single=true&output=csv'
};
var data={A:[],B:[]};
var currentTab='A',currentView='calendario';
var viewYear,viewMonth;
var CLRS=['c0','c1','c2','c3','c4','c5','c6','c7'];

function parseDate(s){if(!s)return null;var p=s.split('/');if(p.length===3)return new Date(+p[2],+p[1]-1,+p[0]);return null;}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function fmtDate(s){var d=parseDate(s);if(!d)return s||'';var mm=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];return d.getDate()+' '+mm[d.getMonth()]+' '+d.getFullYear();}
function parseCSV(t){var lines=t.trim().split('\n');if(lines.length<2)return[];var rows=[];for(var i=1;i<lines.length;i++){var c=lines[i].split(',');if(c.length<2)continue;rows.push({estado:(c[0]||'').trim(),huesped:(c[1]||'').trim(),checkIn:(c[2]||'').trim(),checkOut:(c[3]||'').trim(),noches:(c[4]||'').trim(),personas:(c[5]||'').trim(),ganas:(c[6]||'').trim(),codigo:(c[7]||'').trim()});}return rows;}
function loadData(tab,cb){fetch(URLS[tab]+'&t='+Date.now()).then(function(r){return r.text();}).then(function(t){data[tab]=parseCSV(t);if(cb)cb();}).catch(function(){if(cb)cb();});}

function reloadAll(){
  document.getElementById('sync-info').textContent='Actualizando...';
  loadData('A',function(){loadData('B',function(){
    render();
    var n=new Date(),h=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
    document.getElementById('sync-info').textContent='Actualizado a las '+h;
    document.getElementById('sync-bottom').textContent='Última actualización: '+h+' · Se actualiza cada 10 min';
  });});
}
function render(){renderStats();renderToday();renderCalendar();renderList();}

function renderStats(){
  var rows=data[currentTab],today=new Date();today.setHours(0,0,0,0);
  var ci=0,co=0,active=0,prox=0;
  rows.forEach(function(r){
    if(r.estado==='CANCELADA')return;
    var t1=parseDate(r.checkIn),t2=parseDate(r.checkOut);if(!t1||!t2)return;
    t1=new Date(t1);t1.setHours(0,0,0,0);t2=new Date(t2);t2.setHours(0,0,0,0);
    if(sameDay(t1,today))ci++;if(sameDay(t2,today))co++;
    if(t1<=today&&t2>today)active++;if(t1>today)prox++;
  });
  document.getElementById('stats').innerHTML=st(ci,'Check-in hoy','#1D9E75')+st(co,'Check-out hoy','#EF9F27')+st(active,'En casa ahora','#378ADD')+st(prox,'Próximas','#888');
}
function st(v,l,c){return'<div class="stat"><div class="stat-val" style="color:'+c+'">'+v+'</div><div class="stat-label">'+l+'</div></div>';}

function renderToday(){
  var rows=data[currentTab],today=new Date();today.setHours(0,0,0,0);
  var cards=[];
  rows.forEach(function(r){
    var t1=parseDate(r.checkIn),t2=parseDate(r.checkOut);if(!t1||!t2)return;
    t1=new Date(t1);t1.setHours(0,0,0,0);t2=new Date(t2);t2.setHours(0,0,0,0);
    var isCI=sameDay(t1,today),isCO=sameDay(t2,today);if(!isCI&&!isCO)return;
    cards.push('<div class="today-card'+(isCO&&!isCI?' out':'')+'"><div class="card-type">'+(isCI?'CHECK-IN HOY':'CHECK-OUT HOY')+'</div><div class="card-name">'+(r.huesped||'—')+'</div><div class="card-meta">'+(r.noches?'<span>'+r.noches+' noche'+(r.noches!=='1'?'s':'')+'</span>':'')+(r.personas?'<span>'+r.personas+' persona'+(r.personas!=='1'?'s':'')+'</span>':'')+'</div></div>');
  });
  document.getElementById('today-section').innerHTML=cards.length?'<div class="section-title">HOY</div><div class="today-cards">'+cards.join('')+'</div>':'';
}

function renderCalendar(){
  var rows=data[currentTab];
  var MESES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('cal-month').textContent=MESES[viewMonth]+' '+viewYear;
  var today=new Date();today.setHours(0,0,0,0);
  var firstDay=new Date(viewYear,viewMonth,1).getDay();
  firstDay=firstDay===0?6:firstDay-1;
  var dim=new Date(viewYear,viewMonth+1,0).getDate();
  var monthStart=new Date(viewYear,viewMonth,1);
  var monthEnd=new Date(viewYear,viewMonth+1,0);monthEnd.setHours(23,59,59);

  // Assign color index to each reservation
  var colorIdx={};var ci=0;
  rows.forEach(function(r){var k=r.codigo||r.huesped;if(!colorIdx[k]){colorIdx[k]=CLRS[ci%CLRS.length];ci++;}});

  // Build a map: day -> array of slot objects {colorCls, isStart, isEnd, label, slot}
  // First pass: compute slots
  var daySlots={};
  for(var d=1;d<=dim;d++)daySlots[d]=[];

  // Sort reservations by check-in for consistent slot assignment
  var sorted=rows.slice().sort(function(a,b){var da=parseDate(a.checkIn),db=parseDate(b.checkIn);return(da||new Date(0))-(db||new Date(0));});

  // For each reservation assign a slot number
  var resSlots={};
  sorted.forEach(function(r){
    var t1=parseDate(r.checkIn),t2=parseDate(r.checkOut);if(!t1||!t2)return;
    t1=new Date(t1);t1.setHours(0,0,0,0);t2=new Date(t2);t2.setHours(0,0,0,0);
    if(t2<=monthStart||t1>monthEnd)return;
    var cs=t1<monthStart?new Date(monthStart):t1;
    var ce=new Date(t2.getTime()-86400000);if(ce>monthEnd)ce=new Date(monthEnd);
    var startD=cs.getDate(),endD=ce.getDate();
    // Find free slot across all days of this reservation
    for(var slot=0;slot<10;slot++){
      var free=true;
      for(var d=startD;d<=endD;d++){if(daySlots[d]&&daySlots[d][slot])free=false;}
      if(free){
        for(var d2=startD;d2<=endD;d2++){if(daySlots[d2])daySlots[d2][slot]=true;}
        resSlots[r.codigo||r.huesped+r.checkIn]=slot;
        break;
      }
    }
  });

  // Build cell HTML
  // For each cell, collect bars that pass through it
  var cells='';
  for(var i=0;i<firstDay;i++)cells+='<div class="cal-cell empty"></div>';
  for(var d=1;d<=dim;d++){
    var cd=new Date(viewYear,viewMonth,d);cd.setHours(0,0,0,0);
    var isT=sameDay(cd,today);
    var numHTML=isT?'<span class="today-num">'+d+'</span>':''+d;
    // Collect bars for this day, sorted by slot
    var bars=[];
    sorted.forEach(function(r){
      var t1=parseDate(r.checkIn),t2=parseDate(r.checkOut);if(!t1||!t2)return;
      t1=new Date(t1);t1.setHours(0,0,0,0);t2=new Date(t2);t2.setHours(0,0,0,0);
      if(t2<=monthStart||t1>monthEnd)return;
      var cs=t1<monthStart?new Date(monthStart):t1;
      var ce=new Date(t2.getTime()-86400000);if(ce>monthEnd)ce=new Date(monthEnd);
      if(cd<cs||cd>ce)return;
      var isStart=sameDay(cd,t1)||sameDay(cd,monthStart);
      var isEnd=sameDay(ce,cd);
      var clr=r.estado==='CANCELADA'?'cx':(colorIdx[r.codigo||r.huesped]||'c0');
      var slot=resSlots[r.codigo||r.huesped+r.checkIn]||0;
      var label='';
      if(isStart){
        label=r.huesped||'?';
        if(r.noches)label+=' · '+r.noches+'n';
        if(r.personas)label+=' · '+r.personas+'p';
      }
      bars.push({slot:slot,clr:clr,isStart:isStart,isEnd:isEnd,label:label,
        title:(r.huesped||'?')+'\n'+fmtDate(r.checkIn)+' → '+fmtDate(r.checkOut)+(r.noches?'\n'+r.noches+' noches':'')+(r.personas?' · '+r.personas+' personas':'')});
    });
    bars.sort(function(a,b){return a.slot-b.slot;});
    // Fill empty slots with spacers
    var barsHTML='<div class="bars-area">';
    var maxSlot=bars.length>0?bars[bars.length-1].slot:0;
    var rendered={};
    bars.forEach(function(b){rendered[b.slot]=b;});
    for(var s=0;s<=maxSlot;s++){
      var b=rendered[s];
      if(!b){barsHTML+='<div style="height:22px;margin-bottom:2px;"></div>';continue;}
      var rCls=b.isStart&&b.isEnd?'start end':b.isStart?'start':b.isEnd?'end':'mid';
      var marginL=b.isStart?'0':'-3px';
      var marginR=b.isEnd?'0':'-3px';
      var borderR=b.isEnd?'':'border-top-right-radius:0;border-bottom-right-radius:0;';
      var borderL=b.isStart?'':'border-top-left-radius:0;border-bottom-left-radius:0;';
      barsHTML+='<div class="res-bar '+b.clr+'" style="margin-left:'+marginL+';margin-right:'+marginR+';'+borderR+borderL+'" title="'+b.title+'">'+(b.label?'<span class="bar-label">'+b.label+'</span>':'')+'</div>';
    }
    barsHTML+='</div>';
    cells+='<div class="cal-cell'+(isT?' today-cell':'')+'"><span class="day-num">'+numHTML+'</span>'+barsHTML+'</div>';
  }
  document.getElementById('cal-body').innerHTML=cells;
}

function changeMonth(delta){viewMonth+=delta;if(viewMonth>11){viewMonth=0;viewYear++;}if(viewMonth<0){viewMonth=11;viewYear--;}renderCalendar();}

function renderList(){
  var rows=data[currentTab];
  if(!rows||!rows.length){document.getElementById('res-list').innerHTML='<div style="text-align:center;padding:30px;color:#bbb">Sin reservas</div>';return;}
  var sorted=rows.slice().sort(function(a,b){var da=parseDate(a.checkIn),db=parseDate(b.checkIn);if(!da&&!db)return 0;if(!da)return 1;if(!db)return-1;return da-db;});
  document.getElementById('res-list').innerHTML=sorted.map(function(r){
    var sc=r.estado==='CONFIRMADA'?'#1D9E75':r.estado==='CANCELADA'?'#E24B4A':'#EF9F27';
    var bc='b-'+(r.estado||'confirmada').toLowerCase();
    var meta=[];if(r.noches)meta.push(r.noches+' noche'+(r.noches!=='1'?'s':''));if(r.personas)meta.push(r.personas+' persona'+(r.personas!=='1'?'s':''));
    return'<div class="res-item"><div class="res-dot" style="background:'+sc+'"></div><div class="res-info"><div class="res-name">'+(r.huesped||'—')+'</div><div class="res-dates">'+(r.checkIn?fmtDate(r.checkIn):'?')+' → '+(r.checkOut?fmtDate(r.checkOut):'?')+(meta.length?' · '+meta.join(' · '):'')+'</div></div><div class="res-badge '+bc+'">'+(r.estado||'')+'</div></div>';
  }).join('');
}

function switchTab(tab,el){currentTab=tab;document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');render();}
function switchView(view,el){currentView=view;document.querySelectorAll('.view-tab').forEach(function(t){t.classList.remove('active');});el.classList.add('active');document.getElementById('view-calendario').style.display=view==='calendario'?'block':'none';document.getElementById('view-lista').style.display=view==='lista'?'block':'none';}

var now=new Date();viewYear=now.getFullYear();viewMonth=now.getMonth();
reloadAll();
setInterval(reloadAll,10*60*1000);
</script>
</body>
</html>
