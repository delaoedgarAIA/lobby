<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservas Airbnb · Lobby</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a2e; min-height: 100vh; }

  .header { background: #FF5A5F; color: white; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
  .header-title { font-size: 16px; font-weight: 600; letter-spacing: .03em; }
  .header-sub { font-size: 11px; opacity: .8; margin-top: 2px; }
  .sync-btn { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4); color: white; padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; }
  .sync-btn:active { background: rgba(255,255,255,.35); }

  .tabs { display: flex; background: white; border-bottom: 1px solid #eee; }
  .tab { flex: 1; padding: 14px 8px; text-align: center; font-size: 13px; font-weight: 500; color: #888; cursor: pointer; border-bottom: 3px solid transparent; transition: all .2s; }
  .tab.active { color: #FF5A5F; border-bottom-color: #FF5A5F; }

  .content { padding: 16px; max-width: 900px; margin: 0 auto; }

  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
  @media (min-width: 480px) { .stats { grid-template-columns: repeat(4, 1fr); } }
  .stat { background: white; border-radius: 12px; padding: 14px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .stat-val { font-size: 28px; font-weight: 600; line-height: 1; }
  .stat-label { font-size: 11px; color: #888; margin-top: 4px; }

  .section-title { font-size: 11px; font-weight: 600; color: #888; letter-spacing: .08em; margin: 20px 0 10px; text-transform: uppercase; }

  .today-cards { display: grid; gap: 10px; }
  @media (min-width: 480px) { .today-cards { grid-template-columns: repeat(2, 1fr); } }
  .today-card { background: white; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); border-left: 4px solid #1D9E75; }
  .today-card.out { border-left-color: #EF9F27; }
  .today-card.cancel { border-left-color: #E24B4A; opacity: .7; }
  .card-type { font-size: 10px; font-weight: 600; letter-spacing: .06em; color: #1D9E75; margin-bottom: 4px; }
  .today-card.out .card-type { color: #EF9F27; }
  .card-name { font-size: 16px; font-weight: 600; color: #1a1a2e; margin-bottom: 6px; }
  .card-meta { display: flex; gap: 14px; flex-wrap: wrap; }
  .meta-item { font-size: 12px; color: #666; display: flex; align-items: center; gap: 4px; }
  .meta-dot { width: 4px; height: 4px; border-radius: 50%; background: #ccc; }

  .cal-wrap { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06); overflow: hidden; margin-bottom: 16px; }
  .cal-nav { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid #f0f0f0; }
  .cal-nav-btn { background: #f5f5f5; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #555; }
  .cal-nav-btn:active { background: #e8e8e8; }
  .cal-month { font-size: 15px; font-weight: 600; }

  .cal-days { display: grid; grid-template-columns: repeat(7, 1fr); background: #fafafa; border-bottom: 1px solid #f0f0f0; }
  .cal-day-name { text-align: center; font-size: 11px; color: #aaa; padding: 8px 4px; font-weight: 600; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-cell { min-height: 72px; border-top: 1px solid #f5f5f5; border-right: 1px solid #f5f5f5; padding: 4px; }
  .cal-cell:nth-child(7n) { border-right: none; }
  .cal-cell.empty { background: #fafafa; }
  .cal-cell.today { background: #fff8f8; }
  .day-num { font-size: 11px; color: #aaa; margin-bottom: 3px; }
  .cal-cell.today .day-num { color: #FF5A5F; font-weight: 700; background: #FF5A5F; color: white; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }

  .res-block { border-radius: 3px; padding: 2px 4px; font-size: 9px; margin-bottom: 2px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; line-height: 1.5; font-weight: 500; }
  .res-block.checkin  { background: #E8F8F5; color: #0F6E56; border-left: 2px solid #1D9E75; }
  .res-block.stay     { background: #E6F1FB; color: #185FA5; border-left: 2px solid #378ADD; }
  .res-block.checkout { background: #FAEEDA; color: #854F0B; border-left: 2px solid #EF9F27; }
  .res-block.cancel   { background: #FCEBEB; color: #A32D2D; border-left: 2px solid #E24B4A; text-decoration: line-through; }

  .legend { display: flex; gap: 12px; flex-wrap: wrap; padding: 10px 16px; border-top: 1px solid #f0f0f0; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; }

  .reservations-list { display: grid; gap: 8px; }
  .res-item { background: white; border-radius: 10px; padding: 12px 14px; box-shadow: 0 1px 3px rgba(0,0,0,.05); display: flex; align-items: center; gap: 12px; }
  .res-status { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .res-info { flex: 1; min-width: 0; }
  .res-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .res-dates { font-size: 12px; color: #888; margin-top: 2px; }
  .res-badge { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 10px; flex-shrink: 0; }
  .badge-confirmada { background: #E8F8F5; color: #0F6E56; }
  .badge-cancelada  { background: #FCEBEB; color: #A32D2D; }
  .badge-modificada { background: #FAEEDA; color: #854F0B; }

  .empty-state { text-align: center; padding: 32px; color: #bbb; font-size: 14px; }
  .sync-info { text-align: center; font-size: 11px; color: #bbb; padding: 12px; }

  .view-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .view-tab { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid #e0e0e0; color: #888; background: white; }
  .view-tab.active { background: #1a1a2e; color: white; border-color: #1a1a2e; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Reservas Airbnb</div>
    <div class="header-sub" id="sync-info">Cargando...</div>
  </div>
  <button class="sync-btn" onclick="reloadAll()">&#8635; Actualizar</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('A',this)">Avitat Link 9-6</div>
  <div class="tab" onclick="switchTab('B',this)">Avitat Joy 7-3</div>
</div>

<div class="content">
  <div class="stats" id="stats"></div>

  <div class="view-tabs">
    <div class="view-tab active" onclick="switchView('calendario',this)">Calendario</div>
    <div class="view-tab" onclick="switchView('lista',this)">Lista completa</div>
  </div>

  <div id="view-calendario">
    <div id="today-section"></div>
    <div class="section-title">Calendario</div>
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="changeMonth(-1)">&#8249;</button>
        <span class="cal-month" id="cal-month"></span>
        <button class="cal-nav-btn" onclick="changeMonth(1)">&#8250;</button>
      </div>
      <div class="cal-days">
        <div class="cal-day-name">L</div><div class="cal-day-name">M</div>
        <div class="cal-day-name">X</div><div class="cal-day-name">J</div>
        <div class="cal-day-name">V</div><div class="cal-day-name">S</div>
        <div class="cal-day-name">D</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>Check-in</div>
        <div class="leg"><div class="leg-dot" style="background:#378ADD"></div>Estancia</div>
        <div class="leg"><div class="leg-dot" style="background:#EF9F27"></div>Check-out</div>
        <div class="leg"><div class="leg-dot" style="background:#E24B4A"></div>Cancelada</div>
      </div>
    </div>
  </div>

  <div id="view-lista" style="display:none">
    <div class="section-title">Todas las reservas</div>
    <div class="reservations-list" id="res-list"></div>
  </div>

  <div class="sync-info" id="sync-bottom"></div>
</div>

<script>
var URLS = {
  A: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTXVQJzIRvR0wzuxx7A_XnTEUvgdtNo5EZsJoFf_bhC6U7ehrkYw2byWa5c1LOLbzXSrVmW3RY8CDRG/pub?gid=579686547&single=true&output=csv',
  B: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTXVQJzIRvR0wzuxx7A_XnTEUvgdtNo5EZsJoFf_bhC6U7ehrkYw2byWa5c1LOLbzXSrVmW3RY8CDRG/pub?gid=1903262233&single=true&output=csv'
};
var data = { A: [], B: [] };
var currentTab = 'A';
var currentView = 'calendario';
var viewYear, viewMonth;

function parseDate(str) {
  if (!str) return null;
  var p = str.split('/');
  if (p.length === 3) return new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
  return null;
}

function fmtDate(str) {
  var d = parseDate(str);
  if (!d) return str;
  var meses = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return d.getDate() + ' ' + meses[d.getMonth()] + ' ' + d.getFullYear();
}

function parseCSV(text) {
  var lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  var rows = [];
  for (var i = 1; i < lines.length; i++) {
    var cols = lines[i].split(',');
    if (cols.length < 2) continue;
    rows.push({
      estado:   (cols[0]||'').trim(),
      huesped:  (cols[1]||'').trim(),
      checkIn:  (cols[2]||'').trim(),
      checkOut: (cols[3]||'').trim(),
      noches:   (cols[4]||'').trim(),
      personas: (cols[5]||'').trim(),
      ganas:    (cols[6]||'').trim(),
      codigo:   (cols[7]||'').trim()
    });
  }
  return rows;
}

function loadData(tab, cb) {
  fetch(URLS[tab] + '&t=' + Date.now())
    .then(function(r) { return r.text(); })
    .then(function(t) { data[tab] = parseCSV(t); if(cb) cb(); })
    .catch(function() { if(cb) cb(); });
}

function reloadAll() {
  document.getElementById('sync-info').textContent = 'Actualizando...';
  loadData('A', function() {
    loadData('B', function() {
      render();
      var now = new Date();
      var hora = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
      document.getElementById('sync-info').textContent = 'Actualizado a las ' + hora;
      document.getElementById('sync-bottom').textContent = 'Última actualización: ' + hora + ' · Se actualiza cada 10 min';
    });
  });
}

function render() {
  renderStats();
  renderToday();
  renderCalendar();
  renderList();
}

function renderStats() {
  var rows = data[currentTab];
  var today = new Date(); today.setHours(0,0,0,0);
  var ci=0, co=0, active=0, prox=0;
  rows.forEach(function(r) {
    if (r.estado === 'CANCELADA') return;
    var d1 = parseDate(r.checkIn), d2 = parseDate(r.checkOut);
    if (!d1 || !d2) return;
    var t1 = new Date(d1); t1.setHours(0,0,0,0);
    var t2 = new Date(d2); t2.setHours(0,0,0,0);
    if (t1.getTime() === today.getTime()) ci++;
    if (t2.getTime() === today.getTime()) co++;
    if (t1 <= today && t2 > today) active++;
    if (t1 > today) prox++;
  });
  document.getElementById('stats').innerHTML =
    stat(ci,   'Check-in hoy',  '#1D9E75') +
    stat(co,   'Check-out hoy', '#EF9F27') +
    stat(active,'En casa ahora','#378ADD') +
    stat(prox,  'Próximas',     '#888');
}

function stat(val, label, color) {
  return '<div class="stat"><div class="stat-val" style="color:'+color+'">'+val+'</div><div class="stat-label">'+label+'</div></div>';
}

function renderToday() {
  var rows = data[currentTab];
  var today = new Date(); today.setHours(0,0,0,0);
  var cards = [];
  rows.forEach(function(r) {
    var d1 = parseDate(r.checkIn), d2 = parseDate(r.checkOut);
    if (!d1 || !d2) return;
    var t1 = new Date(d1); t1.setHours(0,0,0,0);
    var t2 = new Date(d2); t2.setHours(0,0,0,0);
    var isCI = t1.getTime() === today.getTime();
    var isCO = t2.getTime() === today.getTime();
    if (!isCI && !isCO) return;
    var cls = isCO ? ' out' : '';
    var tipo = isCI ? 'CHECK-IN HOY' : 'CHECK-OUT HOY';
    cards.push(
      '<div class="today-card'+cls+'">'+
        '<div class="card-type">'+tipo+'</div>'+
        '<div class="card-name">'+(r.huesped||'—')+'</div>'+
        '<div class="card-meta">'+
          (r.noches ? '<span class="meta-item">'+r.noches+' noche'+(r.noches!=='1'?'s':'')+'</span>' : '')+
          (r.noches && r.personas ? '<span class="meta-dot"></span>' : '')+
          (r.personas ? '<span class="meta-item">'+r.personas+' persona'+(r.personas!=='1'?'s':'')+'</span>' : '')+
        '</div>'+
      '</div>'
    );
  });
  var html = '';
  if (cards.length > 0) {
    html = '<div class="section-title">HOY</div><div class="today-cards">'+cards.join('')+'</div>';
  }
  document.getElementById('today-section').innerHTML = html;
}

function renderCalendar() {
  var rows = data[currentTab];
  var meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('cal-month').textContent = meses[viewMonth] + ' ' + viewYear;

  var today = new Date(); today.setHours(0,0,0,0);
  var firstDay = new Date(viewYear, viewMonth, 1).getDay();
  firstDay = firstDay === 0 ? 6 : firstDay - 1;
  var daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();

  var cells = '';
  for (var i = 0; i < firstDay; i++) cells += '<div class="cal-cell empty"></div>';

  for (var d = 1; d <= daysInMonth; d++) {
    var cellDate = new Date(viewYear, viewMonth, d); cellDate.setHours(0,0,0,0);
    var isToday = cellDate.getTime() === today.getTime();
    var blocks = '';
    var dayNumHtml = isToday
      ? '<div class="day-num"><span style="background:#FF5A5F;color:white;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;">'+d+'</span></div>'
      : '<div class="day-num">'+d+'</div>';

    rows.forEach(function(r) {
      var d1 = parseDate(r.checkIn), d2 = parseDate(r.checkOut);
      if (!d1 || !d2) return;
      var t1 = new Date(d1); t1.setHours(0,0,0,0);
      var t2 = new Date(d2); t2.setHours(0,0,0,0);
      var isCI = t1.getTime() === cellDate.getTime();
      var isCO = t2.getTime() === cellDate.getTime();
      var isStay = cellDate > t1 && cellDate < t2;
      if (!isCI && !isCO && !isStay) return;
      if (r.estado === 'CANCELADA') {
        if (isCI) blocks += '<div class="res-block cancel">'+(r.huesped||'?')+'</div>';
        return;
      }
      var cls = isCI ? 'checkin' : (isCO ? 'checkout' : 'stay');
      var prefix = isCI ? 'IN ' : (isCO ? 'OUT ' : '');
      var meta = isCI ? ((r.noches?' '+r.noches+'n':'')+(r.personas?' '+r.personas+'p':'')) : '';
      blocks += '<div class="res-block '+cls+'">'+ prefix+(r.huesped||'?')+meta+'</div>';
    });

    cells += '<div class="cal-cell'+(isToday?' today':'')+'">'+dayNumHtml+blocks+'</div>';
  }
  document.getElementById('cal-grid').innerHTML = cells;
}

function renderList() {
  var rows = data[currentTab];
  if (!rows || rows.length === 0) {
    document.getElementById('res-list').innerHTML = '<div class="empty-state">Sin reservas</div>';
    return;
  }
  var today = new Date(); today.setHours(0,0,0,0);
  var sorted = rows.slice().sort(function(a,b) {
    var da = parseDate(a.checkIn), db = parseDate(b.checkIn);
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return da - db;
  });
  var html = sorted.map(function(r) {
    var statusColor = r.estado==='CONFIRMADA' ? '#1D9E75' : r.estado==='CANCELADA' ? '#E24B4A' : '#EF9F27';
    var badge = 'badge-'+(r.estado||'confirmada').toLowerCase();
    var meta = [];
    if (r.noches) meta.push(r.noches+' noche'+(r.noches!=='1'?'s':''));
    if (r.personas) meta.push(r.personas+' persona'+(r.personas!=='1'?'s':''));
    return '<div class="res-item">'+
      '<div class="res-status" style="background:'+statusColor+'"></div>'+
      '<div class="res-info">'+
        '<div class="res-name">'+(r.huesped||'—')+'</div>'+
        '<div class="res-dates">'+(r.checkIn?fmtDate(r.checkIn):'?')+' → '+(r.checkOut?fmtDate(r.checkOut):'?')+(meta.length?' · '+meta.join(' · '):'')+'</div>'+
      '</div>'+
      '<div class="res-badge '+badge+'">'+(r.estado||'')+'</div>'+
    '</div>';
  }).join('');
  document.getElementById('res-list').innerHTML = html;
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  render();
}

function switchView(view, el) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  document.getElementById('view-calendario').style.display = view==='calendario' ? 'block' : 'none';
  document.getElementById('view-lista').style.display = view==='lista' ? 'block' : 'none';
}

function changeMonth(delta) {
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth=0; viewYear++; }
  if (viewMonth < 0)  { viewMonth=11; viewYear--; }
  renderCalendar();
}

var now = new Date();
viewYear = now.getFullYear();
viewMonth = now.getMonth();

reloadAll();
setInterval(reloadAll, 10 * 60 * 1000);
</script>
</body>
</html>
