<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reservas Lobby - Apto 9-6</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.header{background:white;padding:1rem 1.5rem;border-bottom:1px solid #e8e8e4;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.header h1{font-size:18px;font-weight:700}.header p{font-size:12px;color:#999;margin-top:2px}
.status{display:flex;align-items:center;gap:6px;font-size:12px;color:#999}
.dot{width:9px;height:9px;border-radius:50%;background:#ccc;flex-shrink:0}
.dot.online{background:#1D9E75}.dot.loading{background:#EF9F27;animation:pulse 1s infinite}.dot.error{background:#E24B4A}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:1rem 1rem .5rem;background:white;border-bottom:1px solid #e8e8e4}
.metric{background:#f5f5f0;border-radius:10px;padding:.75rem 1rem}
.metric-label{font-size:11px;color:#999;margin-bottom:3px}.metric-value{font-size:26px;font-weight:700}
.content{padding:.75rem 1rem 3rem;max-width:700px;margin:0 auto}
.section-label{font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;letter-spacing:.08em;margin:1.25rem 0 .5rem}
.card{background:white;border:1px solid #e8e8e4;border-radius:12px;padding:1rem 1.25rem;margin-bottom:8px}
.card.ci-hoy{border-left:4px solid #1D9E75;border-radius:0 12px 12px 0}
.card.ci-man{border-left:4px solid #378ADD;border-radius:0 12px 12px 0}
.card.activo{border-left:4px solid #7F77DD;border-radius:0 12px 12px 0}
.card.co-hoy{border-left:4px solid #E24B4A;border-radius:0 12px 12px 0}
.card.proxima{border-left:4px solid #ddd;border-radius:0 12px 12px 0}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-left{display:flex;align-items:center;gap:10px}
.avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.av-g{background:#E1F5EE;color:#0F6E56}.av-b{background:#E6F1FB;color:#185FA5}
.av-p{background:#EEEDFE;color:#3C3489}.av-r{background:#FCEBEB;color:#A32D2D}.av-gr{background:#f0f0ec;color:#5F5E5A}
.nombre{font-size:17px;font-weight:700}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.bh{background:#E1F5EE;color:#0F6E56}.bm{background:#E6F1FB;color:#185FA5}
.ba{background:#EEEDFE;color:#3C3489}.bc{background:#FCEBEB;color:#A32D2D}.bp{background:#f0f0ec;color:#888}
.card-info{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.info-item{display:flex;flex-direction:column}
.info-label{font-size:10px;color:#bbb;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.info-val{font-size:14px;font-weight:700;color:#1a1a1a}
.info-val.big{font-size:22px;color:#1D9E75}.info-val.big-b{font-size:22px;color:#378ADD}
.empty{text-align:center;padding:2.5rem;color:#bbb;font-size:14px;background:white;border-radius:12px;border:1px solid #e8e8e4}
.cal-wrap{background:white;border-radius:12px;border:1px solid #e8e8e4;padding:1rem 1.25rem}
.cal-title{font-size:14px;font-weight:700;margin-bottom:10px}
.cal-legend{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.cal-li{display:flex;align-items:center;gap:5px;font-size:11px;color:#888}
.cal-ld{width:10px;height:10px;border-radius:3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-dh{font-size:10px;color:#bbb;text-align:center;padding:3px 0;font-weight:700}
.cal-cell{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:#ccc}
.cal-cell.occ{background:#E1F5EE;color:#085041;font-weight:600}
.cal-cell.ci{background:#1D9E75;color:white;font-weight:700}
.cal-cell.co{background:#FCEBEB;color:#A32D2D;font-weight:700}
.cal-cell.hoy{outline:2px solid #378ADD;outline-offset:-2px}
.footer{text-align:center;font-size:11px;color:#ccc;padding:1.5rem 0 .5rem}
@media(max-width:480px){.metrics{grid-template-columns:1fr 1fr}.metrics .metric:last-child{grid-column:span 2}.card-info{grid-template-columns:1fr 1fr}}
</style></head><body>
<div class="header">
  <div><h1>Reservas - Apto 9-6</h1><p>Nuevo, acogedor, seguro y elegante - Gym, piscina</p></div>
  <div class="status"><div class="dot loading" id="dot"></div><span id="stxt">Cargando...</span></div>
</div>
<div class="metrics">
  <div class="metric"><div class="metric-label">Check-ins hoy</div><div class="metric-value" id="m1">-</div></div>
  <div class="metric"><div class="metric-label">Check-ins manana</div><div class="metric-value" id="m2">-</div></div>
  <div class="metric"><div class="metric-label">Activos ahora</div><div class="metric-value" id="m3">-</div></div>
</div>
<div class="content" id="content"><div class="empty">Cargando reservas...</div></div>
<script>
const SID='1l4faXS64R7KUq-BwLD2-Uyz48X3eQH8hZZ1arTliNFw';
const CURL='https://docs.google.com/spreadsheets/d/'+SID+'/gviz/tq?tqx=out:csv&sheet=Reservas';
const MES=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
const DIA=['dom','lun','mar','mie','jue','vie','sab'];
const MESF=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function pd(s){if(!s)return null;const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function fmt(d){return DIA[d.getDay()]+' '+d.getDate()+' '+MES[d.getMonth()];}
function ini(n){const p=n.trim().split(/s+/);return p.length>=2?(p[0][0]+p[1][0]).toUpperCase():n.substring(0,2).toUpperCase();}
function card(r,t,lb){
  const av={ci_hoy:'av-g',ci_man:'av-b',activo:'av-p',co_hoy:'av-r',proxima:'av-gr'};
  const b={ci_hoy:'bh',ci_man:'bm',activo:'ba',co_hoy:'bc',proxima:'bp'};
  const pB=(t==='ci_hoy'||t==='activo')?'big':'';
  const nB=t==='ci_man'?'big-b':'';
  return '<div class="card '+t.replace(/_/g,'-')+'"><div class="card-top"><div class="card-left"><div class="avatar '+av[t]+'">'+ini(r.nombre)+'</div><div class="nombre">'+r.nombre+'</div></div><span class="badge '+b[t]+'">'+lb+'</span></div><div class="card-info"><div class="info-item"><span class="info-label">Ingreso</span><span class="info-val">'+fmt(pd(r.ingreso))+'</span></div><div class="info-item"><span class="info-label">Salida</span><span class="info-val">'+fmt(pd(r.salida))+'</span></div><div class="info-item"><span class="info-label">Noches</span><span class="info-val '+nB+'">'+r.noches+'</span></div><div class="info-item"><span class="info-label">Personas</span><span class="info-val '+pB+'">'+r.personas+'</span></div></div></div>';
}
function renderCal(rv,hoy){
  const y=hoy.getFullYear(),m=hoy.getMonth(),first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  const ci=new Set(),co=new Set(),occ=new Set();
  rv.forEach(r=>{if(r.estado==='cancelada')return;const s=pd(r.ingreso),e=pd(r.salida);ci.add(s.toDateString());co.add(e.toDateString());let d=new Date(s);d.setDate(d.getDate()+1);while(d<e){occ.add(d.toDateString());d.setDate(d.getDate()+1);}});
  let h='<div class="cal-wrap"><div class="cal-title">'+MESF[m]+' '+y+'</div><div class="cal-legend"><div class="cal-li"><div class="cal-ld" style="background:#1D9E75"></div>Check-in</div><div class="cal-li"><div class="cal-ld" style="background:#E1F5EE;border:1px solid #9FE1CB"></div>Ocupado</div><div class="cal-li"><div class="cal-ld" style="background:#FCEBEB;border:1px solid #F5C4B3"></div>Check-out</div></div><div class="cal-grid">';
  ['Do','Lu','Ma','Mi','Ju','Vi','Sa'].forEach(d=>h+='<div class="cal-dh">'+d+'</div>');
  for(let i=0;i<first;i++)h+='<div class="cal-cell"></div>';
  for(let d=1;d<=days;d++){const fd=new Date(y,m,d),ds=fd.toDateString();let c='';if(ci.has(ds))c='ci';else if(co.has(ds))c='co';else if(occ.has(ds))c='occ';if(fd.getTime()===hoy.getTime())c+=' hoy';h+='<div class="cal-cell '+c+'">'+d+'</div>';}
  return h+'</div></div>';
}
function render(rv){
  const hoy=new Date();hoy.setHours(0,0,0,0);const man=new Date(hoy);man.setDate(man.getDate()+1);
  const act=rv.filter(r=>r.estado!=='cancelada');
  const coH=act.filter(r=>pd(r.salida).getTime()===hoy.getTime());
  const ciH=act.filter(r=>pd(r.ingreso).getTime()===hoy.getTime());
  const ciM=act.filter(r=>pd(r.ingreso).getTime()===man.getTime());
  const hos=act.filter(r=>pd(r.ingreso)<hoy&&pd(r.salida)>hoy);
  const prx=act.filter(r=>pd(r.ingreso)>man).sort((a,b)=>pd(a.ingreso)-pd(b.ingreso)).slice(0,5);
  document.getElementById('m1').textContent=ciH.length;
  document.getElementById('m2').textContent=ciM.length;
  document.getElementById('m3').textContent=hos.length;
  let h='';
  if(coH.length){h+='<div class="section-label">Check-out hoy</div>';coH.forEach(r=>h+=card(r,'co_hoy','Sale hoy'));}
  if(ciH.length){h+='<div class="section-label">Check-in hoy</div>';ciH.forEach(r=>h+=card(r,'ci_hoy','Entra hoy'));}
  if(hos.length){h+='<div class="section-label">Hospedados ahora</div>';hos.forEach(r=>h+=card(r,'activo','Sale '+fmt(pd(r.salida))));}
  if(ciM.length){h+='<div class="section-label">Check-in manana</div>';ciM.forEach(r=>h+=card(r,'ci_man','Manana'));}
  if(prx.length){h+='<div class="section-label">Proximas reservas</div>';prx.forEach(r=>h+=card(r,'proxima',fmt(pd(r.ingreso))));}
  if(!h)h='<div class="empty">No hay reservas proximas registradas</div>';
  h+='<div class="section-label">Calendario</div>'+renderCal(act,hoy);
  const now=new Date();
  h+='<div class="footer">Actualizado: '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0')+'</div>';
  document.getElementById('content').innerHTML=h;
}
function parseCSV(t){
  const lines=t.trim().split('
');if(lines.length<2)return[];
  return lines.slice(1).map(l=>{
    const c=l.match(/(".*?"|[^",]+)(?=s*,|s*$)/g)||[];
    const cl=c.map(x=>x.replace(/^"|"$/g,'').trim());
    return{nombre:cl[1]||'Huesped',ingreso:cl[2],salida:cl[3],noches:cl[4]||'?',personas:cl[5]||'?',estado:cl[6]||'confirmada'};
  }).filter(r=>r.ingreso&&r.salida);
}
async function load(){
  document.getElementById('dot').className='dot loading';
  document.getElementById('stxt').textContent='Actualizando...';
  try{
    const res=await fetch(CURL+'&t='+Date.now());
    if(!res.ok)throw new Error('HTTP '+res.status);
    render(parseCSV(await res.text()));
    document.getElementById('dot').className='dot online';
    document.getElementById('stxt').textContent='En vivo';
  }catch(e){
    document.getElementById('dot').className='dot error';
    document.getElementById('stxt').textContent='Sin datos';
    document.getElementById('content').innerHTML='<div class="empty">Sin reservas aun. Se activara con la primera reserva de Airbnb.</div>';
  }
}
load();setInterval(load,5*60*1000);
</script></body></html>
